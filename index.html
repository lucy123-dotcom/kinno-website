<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kinno — Coming Soon</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 28px 36px;
    }

    header img {
      height: 52px;
      width: auto;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .coming-soon {
      text-align: center;
    }

    .coming-soon h1 {
      font-size: clamp(48px, 10vw, 96px);
      font-weight: 700;
      color: #4A5CF0;
      letter-spacing: -0.02em;
      line-height: 1.05;
    }
  </style>
</head>
<body>

  <header>
    <img src="Kinno_logo.png" alt="Kinno" />
  </header>

  <main>
    <div class="coming-soon">
      <h1>Coming soon.</h1>
    </div>
  </main>

</body>
</html>
