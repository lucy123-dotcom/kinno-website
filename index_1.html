<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kinno — Coming Soon</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .coming-soon {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .coming-soon img {
      width: min(480px, 80vw);
      height: auto;
      margin-bottom: 8px;
    }

    .coming-soon h1 {
      font-size: clamp(40px, 8vw, 80px);
      font-weight: 700;
      color: #4A5CF0;
      letter-spacing: -0.02em;
      line-height: 1.05;
      margin: 0;
    }

    .coming-soon p {
      font-size: clamp(16px, 2.5vw, 22px);
      color: #4A5CF0;
      font-weight: 400;
      opacity: 0.6;
      margin: 0;
    }
  </style>
</head>
<body>

  <div class="coming-soon">
    <img src="./Kinno_logo.png" alt="Kinno" />
    <h1>Coming soon.</h1>
    <p>Your social concierge.</p>
  </div>

</body>
</html>
